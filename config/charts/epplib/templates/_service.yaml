{{- define "inference-extension.service" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-d-router.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-router.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "llm-d-router.selectorLabels" . | nindent 4 }}
  ports:
    - name: grpc-ext-proc
      protocol: TCP
      port: {{ .Values.inferenceExtension.extProcPort | default 9002 }}
    - name: http-metrics
      protocol: TCP
      port: {{ .Values.inferenceExtension.metricsPort | default 9090 }}
    {{- with .Values.inferenceExtension.extraServicePorts }}
    {{- . | toYaml | nindent 4 }}
    {{- end }}
  type: ClusterIP
---
{{- end }}
